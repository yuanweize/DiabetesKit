name: Build & Release PDFs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build PDFs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live & fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-luatex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-lang-cjk \
            texlive-lang-japanese \
            texlive-lang-arabic \
            texlive-lang-other \
            texlive-lang-european \
            fonts-noto-cjk \
            fonts-noto-core \
            fonts-noto-extra \
            lmodern \
            python3

      - name: Build all PDFs
        run: make all

      - name: Verify single-page PDFs
        run: |
          for f in pdf/*.pdf; do
            pages=$(pdfinfo "$f" 2>/dev/null | grep Pages | awk '{print $2}' || echo "?")
            echo "$f: $pages page(s)"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: diabetes-kit-pdfs
          path: pdf/
          retention-days: 30

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download PDFs
        uses: actions/download-artifact@v4
        with:
          name: diabetes-kit-pdfs
          path: pdf/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pdf/*.pdf
          generate_release_notes: true
          body: |
            ## 📥 Download / 下载

            This release includes **blood glucose monitoring log** PDFs in all supported languages.
            Each PDF is a single A4 portrait page, optimized for printing and AI-assisted analysis.

            See `locales/` directory for the full list of supported languages.

            **Print:** A4 Portrait / A4 竖向打印
